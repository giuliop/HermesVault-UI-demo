{{define "main"}}
<!DOCTYPE html>
<html>
<head>
    <title>Hermes Vault</title>
    <link rel="stylesheet"
          href="https://unpkg.com/missing.css/dist/missing.min.css"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="static/main.css">
    <script src="https://unpkg.com/htmx.org@2.0.1"
            integrity="sha384-QWGpdj554B4ETpJJC9z+ZHJcA/i59TyjxEPXiiUgN2WmTyV5OEZWCD6gQhgkdpB/"
            crossorigin="anonymous">
    </script>
    <script src="https://unpkg.com/htmx-ext-response-targets@2.0.0/response-targets.js"></script>
    <script src="static/wallet.js" type="module" defer> </script>
    <script src="static/behaviors.js" type="module" defer> </script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body hx-boost="true"
      hx-ext="response-targets"
>
    <h1 class="title">Hermes Vault</h1>
    <div id="ui"
         hx-get="/deposit"
         hx-trigger="load delay:100ms"
         hx-target="#ui"
         hx-swap="innerHTML">
    </div>
</body>

</html>
{{end}}


{{define "tabList"}}
<div class="tab-list" role="tablist" hx-swap="innerHTML settle:0s">
    <button hx-get="/deposit"
            class="{{if eq . `deposit`}}selected{{end}}"
            role="tab" aria-selected="{{if eq . `deposit`}}true{{else}}false{{end}}" aria-controls="tab-content">
        Deposit
    </button>
    <button hx-get="/withdraw"
            class="{{if eq . `withdraw`}}selected{{end}}"
            role="tab" aria-selected="{{if eq . `withdraw`}}true{{else}}false{{end}}" aria-controls="tab-content">
        Withdraw
    </button>
</div>
{{end}}

{{define "deposit"}}
{{template "tabList" "deposit"}}
<div id="tab-content" class="tab-content" role="tabpanel" data-wallet>
	<h2>Deposit</h2>
	<form hx-post="/deposit"
          hx-target-error="#errorMsg"
          hx-on::config-request="behaviors.Trim.restoreAll(event)"
          data-wallet-form>
        <p class="row">
            <label for="depositAmount">
                Amount
            </label>
            <input type="number" id="depositAmount" name="amount"
                   placeholder="algo to deposit"
                   step="0.000001" min="1"
                   required>
        </p>
        <p class="row">
            <label for="depositAddress">
                From
            </label>
            <input type="text" id="depositAddress" name="address"
                   data-wallet-address
                   onblur="behaviors.Trim.trim(this)"
                   onfocus="behaviors.Trim.restore(this)" autocomplete="off" readonly >
        </p>
        <button type="submit" data-wallet-submit-button>
            Deposit
        </button>
    </form>
    <div>
        <button class="connect-wallet" data-wallet-connect-button>
            Connect Wallet
        </button>
    </div>
</div>
<div id="errorMsg" class="error"></div>
{{end}}

{{define "withdraw"}}
{{template "tabList" "withdraw"}}
<div id="tab-content" class="tab-content" role="tabpanel">
    <h2>Withdraw</h2>
    <form hx-post="/withdraw"
          hx-target-error="#errorMsg"
          hx-on::config-request="behaviors.Trim.restoreAll(event)"
		>
        <p class="row">
            <label for="withdrawAmount">
                Amount
            </label>
            <input type="number" id="withdrawAmount" name="amount"
                   placeholder="algo to withdraw"
                   step="0.000001" min="1"
                   required>
        </p>
        <p class="row">
            <label for="withdrawAddress">
                Address
            </label>
            <input type="text" id="withdrawAddress" name="address"
                   autocomplete="off"
                   placeholder="recipient"
                   onfocus="behaviors.Trim.restore(this)"
                   onblur="behaviors.Trim.trim(this)"
                   required>
        </p>
        <p class="row">
            <label for="withdrawNote">
                Note
            </label>
            <input type="text" id="withdrawNote" name="note"
                   placeholder="secret note"
                   onfocus="behaviors.Trim.restore(this)"
                   onblur="behaviors.Trim.trim(this)"
                   required>
        </p>
        <button type="submit"
                hx-target-error="#errorMsg">
            Withdraw
        </button>
    </form>
</div>
<div id="errorMsg" class="error"></div>
{{end}}
