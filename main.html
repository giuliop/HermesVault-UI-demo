{{define "main"}}
<!DOCTYPE html>
<html>
<head>
    <title>Hermes Vault</title>
    <link rel="stylesheet"
          href="https://unpkg.com/missing.css/dist/missing.min.css"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="static/main.css">
    <script src="https://unpkg.com/htmx.org@2.0.1"
            integrity="sha384-QWGpdj554B4ETpJJC9z+ZHJcA/i59TyjxEPXiiUgN2WmTyV5OEZWCD6gQhgkdpB/"
            crossorigin="anonymous">
    </script>
    <script src="https://unpkg.com/htmx-ext-response-targets@2.0.0/response-targets.js"></script>
    <script src="static/wallet.js" type="module" defer> </script>
    <script src="static/behaviors.js" type="module" defer> </script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body hx-boost="true"
      hx-ext="response-targets"
>
    <h1 class="title">Hermes Vault</h1>
    <div id="tabs"
         hx-get="/deposit"
         hx-trigger="load delay:100ms"
         hx-target="#tabs"
         hx-swap="innerHTML"></div>
</body>

</html>
{{end}}

{{define "depositForm"}}
<div class="tab-list" role="tablist">
    <button hx-get="/deposit"
            class="selected"
            role="tab" aria-selected="true" aria-controls="tab-content">
        Deposit
    </button>
    <button hx-get="/withdraw"
            role="tab" aria-selected="false" aria-controls="tab-content">
        Withdraw
    </button>
</div>
<div data-wallet
     id="tab-content"
     class="tab-content"
     role="tabpanel">
    <h2>Deposit</h2>
    <form hx-post="/deposit" class="table rows" hidden>
        <p>
            <label for="depositAmount">Amount</label>
            <input type="number" id="depositAmount" name="amount" required>
        </p>
        <p data-wallet-address>
            <label for="depositAddress">From Address</label>
            <input type="text" id="depositAddress" name="address"
            autocomplete="off"
            readonly>
        </p>
        <button type="submit">
            Deposit
        </button>
    </form>
    <div>
        <button data-wallet-button>
            Connect Pera Wallet
        </button>
    </div>
</div>
{{end}}

{{define "withdrawForm"}}
<div class="tab-list" role="tablist">
	<button hx-get="/deposit"
            role="tab" aria-selected="false" aria-controls="tab-content">
        Deposit
    </button>
	<button hx-get="/withdraw"
            class="selected"
            role="tab" aria-selected="true" aria-controls="tab-content">
        Withdraw
    </button>
</div>
<div id="tab-content"
     class="tab-content"
     role="tabpanel">
    <h2>Withdraw</h2>
    <form id="withdrawForm"
          hx-post="/withdraw"
          hx-target-error="#errorMsg"
          onsubmit="behaviors.restoreAllTrims(this)"
          class="table rows">
        <p>
            <label for="withdrawAmount">Amount</label>
            <input type="number" id="withdrawAmount" name="amount"
                   placeholder="algo to withdraw"
                   step="0.000001" min="1"
                   required>
        </p>
        <p>
            <label for="withdrawAddress">Address</label>
            <input type="text" id="withdrawAddress" name="address"
                   autocomplete="off"
                   placeholder="recipient"
                   onfocus="behaviors.restoreTrim(this)"
                   onblur="behaviors.trim(this)"
                   required>
        </p>
        <p>
            <label for="withdrawNote">Note</label>
            <input type="text" id="withdrawNote" name="note"
                   placeholder="secret note"
                   onfocus="behaviors.restoreTrim(this)"
                   onblur="behaviors.trim(this)"
                   required>
        </p>
        <button type="submit"
                hx-target-error="#errorMsg">
            Submit
        </button>
    </form>
</div>
<div id="errorMsg" class="error"></div>
{{end}}
