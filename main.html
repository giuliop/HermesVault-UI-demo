{{define "main"}}
<!DOCTYPE html>
<html>
<head>
    <title>Hermes Vault</title>
    <link rel="stylesheet" href="https://unpkg.com/missing.css/dist/missing.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="static/main.css">
    <script src="https://unpkg.com/htmx.org@1.9.2"
        integrity="sha384-L6OqL9pRWyyFU3+/bjdSri+iIphTN/bvYyM37tICVyOJkWZLpP2vGn6VUEXgzg6h" crossorigin="anonymous">
    </script>
    <script src="static/wallet.js" type="module" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body hx-boost="true">
    <h1 class="title">Hermes Vault</h1>
    <div id="tabs" hx-get="/deposit" hx-trigger="load delay:100ms" hx-target="#tabs" hx-swap="innerHTML"></div>
</body>

</html>
{{end}}

{{define "depositForm"}}
<div class="tab-list" role="tablist">
    <button hx-get="/deposit" class="selected" role="tab" aria-selected="true" aria-controls="tab-content">Deposit</button>
    <button hx-get="/withdraw" role="tab" aria-selected="false" aria-controls="tab-content">Withdraw</button>
</div>
<div data-wallet id="tab-content" role="tabpanel" class="tab-content">
    <h2>Deposit</h2>
    <form hx-post="/deposit" class="table rows" hidden>
        <p>
            <label for="depositAmount">Amount</label>
            <input type="number" id="depositAmount" name="amount" required>
        </p>
        <p data-wallet-address>
            <label for="depositAddress">From Address</label>
            <input type="text" id="depositAddress" name="address" readonly>
        </p>
        <button type="submit">Deposit</button>
    </form>
    <div>
        <button data-wallet-button>Connect Pera Wallet</button>
    </div>
</div>
{{end}}

{{define "withdrawForm"}}
<div class="tab-list" role="tablist">
	<button hx-get="/deposit" role="tab" aria-selected="false" aria-controls="tab-content">Deposit</button>
	<button hx-get="/withdraw" role="tab" class="selected" role="tab" aria-selected="true" aria-controls="tab-content">Withdraw</button>
</div>
<div id="tab-content" role="tabpanel" class="tab-content">
    <h2>Withdraw</h2>
    <form hx-post="/withdraw" class="table rows">
        <p>
            <label for="withdrawAmount">Amount</label>
            <input type="text" id="withdrawAmount" name="amount" required>
        </p>
        <p>
            <label for="withdrawAddress">Recipient Address</label>
            <input type="text" id="withdrawAddress" name="address" required>
        </p>
        <p>
            <label for="withdrawNote">Secret Note</label>
            <input type="text" id="withdrawNote" name="note" required>
        </p>
        <button type="submit">Submit</button>
    </form>
</div>
{{end}}
